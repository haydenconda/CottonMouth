# Example Prometheus alerting rules built from CottonMouth metrics.
#
# These route through your existing Alertmanager (Slack, PagerDuty, etc.). This
# is the "bring your own alerting stack" path; CottonMouth also ships a built-in
# Slack webhook for teams that don't run Prometheus (see docs/ALERTING.md).
#
# CottonMouth metrics are proper Prometheus counters (the `_total` series) plus a
# few point-in-time gauges (`cottonmouth_up`). Use rate()/increase() on the
# counters. Counters reset to 0 on backend restart — rate()/increase() handle
# that automatically.
#
# For the Prometheus Operator, wrap these in a PrometheusRule CR. Plain
# Prometheus can load this file directly via rule_files.
groups:
  - name: cottonmouth.rules
    rules:
      - alert: CottonMouthBackendDown
        expr: cottonmouth_up != 1 or absent(cottonmouth_up)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CottonMouth backend is not exporting metrics"
          description: "No successful /metrics scrape for 5m."

      - alert: CottonMouthAgentHighErrorRate
        expr: |
          sum by (agent) (rate(cottonmouth_agent_runs_total{status="failed"}[15m]))
            /
          clamp_min(sum by (agent) (rate(cottonmouth_agent_runs_total{status=~"completed|failed"}[15m])), 0.0001)
            > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High error rate for agent {{ $labels.agent }}"
          description: "{{ $labels.agent }} agent-logic error rate is {{ $value | humanizePercentage }} over 15m (infra failures excluded)."

      - alert: CottonMouthAgentCostSpike
        expr: sum by (agent) (rate(cottonmouth_cost_usd_total[5m])) * 3600 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cost spike for agent {{ $labels.agent }}"
          description: "{{ $labels.agent }} is spending ${{ $value | printf \"%.2f\" }}/hr."

      - alert: CottonMouthComplianceDrop
        expr: |
          sum(rate(cottonmouth_permission_checks_total{result="allow"}[15m]))
            /
          clamp_min(sum(rate(cottonmouth_permission_checks_total[15m])), 0.0001)
            < 0.9
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Fleet policy compliance below 90%"
          description: "Fleet compliance is {{ $value | humanizePercentage }} (allowed / total authorization checks over 15m)."

      - alert: CottonMouthDenialSurge
        expr: sum by (agent) (increase(cottonmouth_permission_checks_total{result="deny"}[1h])) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Permission-denial surge for agent {{ $labels.agent }}"
          description: "{{ $labels.agent }} has {{ $value }} denied actions in the last hour."
