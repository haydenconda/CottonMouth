apiVersion: v1
kind: ConfigMap
metadata:
  name: cottonmouth-config
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
data:
  # All mutable state lives here (mounted on the PVC).
  COTTONMOUTH_DATA_DIR: "/data"
  # Don't re-exec on file changes inside the container.
  COTTONMOUTH_DISABLE_RELOAD: "1"
  # Run only the agent-trace watcher (no Slack/GitHub/AWS infra watchers).
  COTTONMOUTH_WATCHERS: "agent-trace"
  # Alert thresholds for the trace watcher.
  AGENT_COST_ALERT_THRESHOLD: "0.30"
  AGENT_LATENCY_ALERT_MULTIPLIER: "2.0"
  # Built-in Slack alerting (optional). Enable by creating the cottonmouth-alerts
  # secret with the webhook URL (see docs/ALERTING.md); events at or above this
  # severity are pushed to Slack. Set COTTONMOUTH_ALERT_SOURCES to filter.
  COTTONMOUTH_ALERT_MIN_SEVERITY: "warning"
  # Makes trace deep-links in Slack clickable; set to the dashboard's public URL.
  COTTONMOUTH_DASHBOARD_URL: ""
  # Bedrock (Investigate) — only used if the SA has IRSA Bedrock access.
  AWS_REGION: "us-east-1"
  BEDROCK_REGION: "us-east-1"
  BEDROCK_MODEL: "us.anthropic.claude-opus-4-6-v1"
  # Dashboard/API auth (CORE-10694). Username for the bootstrap admin account
  # created on first startup (password comes from the cottonmouth-auth secret,
  # see backend.yaml). Cookie defaults to non-Secure because the primary access
  # path today is `kubectl port-forward` over plain http — flip to "1" once
  # this is served over https.
  COTTONMOUTH_ADMIN_USERNAME: "admin"
  COTTONMOUTH_COOKIE_SECURE: "0"
