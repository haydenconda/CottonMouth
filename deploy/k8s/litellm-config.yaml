apiVersion: v1
kind: ConfigMap
metadata:
  name: cottonmouth-litellm-config
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
    app.kubernetes.io/component: litellm
data:
  # LiteLLM resolves `callbacks: <name>.<instance>` as a FILE (<config_dir>/<name>.py)
  # — a dotted package path is mis-read as a path — so this shim re-exports the
  # installed CottonMouth logger for a clean single-dot reference. Mounted next to
  # config.yaml at /etc/litellm/custom_callbacks.py.
  custom_callbacks.py: |
    from cottonmouth.integrations.litellm import (
        cottonmouth_callback as proxy_handler_instance,
    )

  # LiteLLM proxy config. Mounted at /etc/litellm/config.yaml.
  config.yaml: |
    # Models the gateway exposes (OpenAI-format names -> Bedrock under the hood).
    # The gateway holds the only Bedrock credentials (via the pod env / IRSA);
    # callers never see provider creds.
    model_list:
      - model_name: claude-3-haiku
        litellm_params:
          model: bedrock/anthropic.claude-3-haiku-20240307-v1:0
          aws_region_name: us-east-1
      - model_name: claude-3-sonnet
        litellm_params:
          model: bedrock/anthropic.claude-3-sonnet-20240229-v1:0
          aws_region_name: us-east-1

    litellm_settings:
      # CottonMouth observability: every gateway call becomes an llm_call span,
      # and the gateway's own denials are recorded as permission_checks. The SDK
      # self-configures its HTTP exporter from COTTONMOUTH_ENDPOINT (see Deployment).
      callbacks: custom_callbacks.proxy_handler_instance
      drop_params: true

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      # Postgres-backed key management: enables per-agent VIRTUAL KEYS (aliases),
      # budgets, and spend tracking. Set via DATABASE_URL (see postgres.yaml).
      # When unset, the gateway runs DB-less with the master key only.
      database_url: os.environ/DATABASE_URL
      # Persist the model_list above into the DB so /v1/models and /key/info
      # reflect what callers (and CottonMouth's reconcile) actually see.
      store_model_in_db: true

    # MCP tool gateway: brokers MCP tools through the SAME gateway so an agent's
    # TOOL calls (not just its model calls) become observable in CottonMouth. The
    # CottonMouth callback captures each invocation via async_post_mcp_tool_call_hook
    # and emits a tool_call span tagged with the caller's virtual-key alias.
    # Tools surface at GET /mcp; access is brokered by virtual key / team.
    mcp_servers:
      # GitHub's hosted remote MCP. Real devils-council use case: read repo/PR
      # state to scrutinize code (e.g. diff local-unpushed against origin). The
      # PAT is resolved from the gateway env (k8s secret cottonmouth-github-mcp),
      # never baked into this ConfigMap — LiteLLM resolves os.environ/ recursively.
      github:
        url: https://api.githubcopilot.com/mcp/
        transport: http
        auth_type: bearer_token
        auth_value: os.environ/GITHUB_MCP_TOKEN
        description: GitHub read-only repo/PR tools for code scrutiny (devils-council).
        # Grant every virtual key access to this server (e.g. devils-council and
        # future Cursor agents). LiteLLM still gates access at the gateway and
        # records allow/deny; CottonMouth observes and attributes by key alias.
        # Per-key object-permission scoping is enterprise-gated in this build
        # (returns 403), so allow_all_keys is the open-source access lever.
        allow_all_keys: true
