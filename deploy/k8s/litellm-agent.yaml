apiVersion: v1
kind: ServiceAccount
metadata:
  name: cottonmouth-litellm-agent
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
    app.kubernetes.io/component: litellm-agent
  # No provider creds: this agent calls the in-cluster gateway, which holds the
  # only Bedrock credentials. That credential consolidation is the whole point.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cottonmouth-litellm-agent
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
    app.kubernetes.io/component: litellm-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: litellm-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: cottonmouth
        app.kubernetes.io/component: litellm-agent
    spec:
      serviceAccountName: cottonmouth-litellm-agent
      containers:
        - name: litellm-agent
          # Reuses the backend image (bundles the SDK with the [litellm] extra).
          image: cottonmouth-backend:latest
          imagePullPolicy: IfNotPresent
          # An agent that routes model calls through the shared LiteLLM gateway;
          # the gateway's CottonMouth CustomLogger turns each call into an
          # llm_call span nested under this agent_run (with tool + decision spans).
          command: ["python", "examples/litellm_agent.py"]
          env:
            - name: COTTONMOUTH_ENDPOINT
              value: http://cottonmouth-backend:8150
            # Route through the in-cluster gateway (OpenAI format) instead of
            # talking to Bedrock directly. No AWS creds needed here.
            - name: LITELLM_BASE_URL
              value: http://litellm:4000
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cottonmouth-litellm-secret
                  key: master-key
            - name: LITELLM_MODEL
              value: claude-3-haiku
            - name: AGENT_INTERVAL
              value: "30"
          resources:
            requests:
              cpu: 25m
              memory: 160Mi
            limits:
              cpu: 500m
              memory: 384Mi
