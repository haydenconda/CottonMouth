apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cottonmouth-data
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # EKS ships a gp2 StorageClass (not always marked default), so set it
  # explicitly. Change to your cluster's class (e.g. gp3) as needed.
  storageClassName: gp2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cottonmouth-backend
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
    app.kubernetes.io/component: backend
spec:
  # Single replica: the trace store is a file on a ReadWriteOnce volume.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: cottonmouth
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: cottonmouth-backend
      securityContext:
        runAsNonRoot: false
        fsGroup: 0
      containers:
        - name: backend
          image: cottonmouth-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8150
          envFrom:
            - configMapRef:
                name: cottonmouth-config
          env:
            # Read-only reconcile of gateway entitlements (models, and key
            # budget/spend when the gateway is DB-backed) for the governance view.
            - name: LITELLM_BASE_URL
              value: http://litellm:4000
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cottonmouth-litellm-secret
                  key: master-key
            # Policy-as-data from a ConfigMap (not baked into the image), so the
            # org-wide policy can be edited and hot-reloaded without a rebuild:
            #   kubectl -n cottonmouth create configmap cottonmouth-policies \
            #     --from-file=agent_policies.json=agent_policies.json \
            #     --dry-run=client -o yaml | kubectl apply -f -
            #   kubectl -n cottonmouth rollout restart deploy/cottonmouth-backend
            - name: COTTONMOUTH_POLICIES_FILE
              value: /etc/cottonmouth/agent_policies.json
            # Optional built-in Slack alerting. Create the secret to enable:
            #   kubectl -n cottonmouth create secret generic cottonmouth-alerts \
            #     --from-literal=slack-webhook-url=https://hooks.slack.com/services/XXX
            - name: COTTONMOUTH_SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: cottonmouth-alerts
                  key: slack-webhook-url
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            # Tolerate a transient slow read instead of killing the pod on the
            # first miss; heavy reads now run off the event loop, but this adds
            # margin so a one-off GC pause can't trigger a restart.
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: policies
              mountPath: /etc/cottonmouth
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cottonmouth-data
        # Created from agent_policies.json at deploy time (see env comment above).
        # Optional: if absent the backend falls back to the image's bundled copy.
        - name: policies
          configMap:
            name: cottonmouth-policies
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: cottonmouth-backend
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8150
      targetPort: http
