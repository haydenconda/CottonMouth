# Public entry point for the dashboard via the AWS Load Balancer Controller.
# The web app proxies /api/* to the backend, so only the web service is exposed.
#
# Requires aws-load-balancer-controller in the cluster. If it isn't installed,
# remove this file from kustomization.yaml and use port-forward instead:
#   kubectl -n cottonmouth port-forward svc/cottonmouth-web 3000:3000
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cottonmouth-web
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cottonmouth-web
                port:
                  number: 3000
---
# Public entry point for the LiteLLM GATEWAY so external clients (e.g. a dev's
# Cursor, pointed at this as an OpenAI-compatible base URL) route every model
# call through it. Front it with TLS + auth (virtual keys) before exposing to
# the org. For the sandbox, prefer `kubectl port-forward svc/litellm 4000:4000`
# instead of provisioning a throwaway ALB.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cottonmouth-litellm
  namespace: cottonmouth
  labels:
    app.kubernetes.io/part-of: cottonmouth
    app.kubernetes.io/component: litellm
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Terminate TLS at the ALB; supply your ACM cert ARN before enabling HTTPS.
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:<acct>:certificate/<id>
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health/liveness
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
